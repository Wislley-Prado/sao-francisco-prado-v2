<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PradoAqui - Offline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #17A2B8 0%, #0F7A8C 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        
        .container {
            max-width: 400px;
            width: 100%;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border: 3px solid rgba(255, 255, 255, 0.2);
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        
        p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            line-height: 1.6;
        }
        
        .features {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .features h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        
        .features ul {
            list-style: none;
            text-align: left;
        }
        
        .features li {
            padding: 0.5rem 0;
            opacity: 0.9;
        }
        
        .features li:before {
            content: "✓ ";
            font-weight: bold;
            margin-right: 0.5rem;
        }
        
        .retry-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .retry-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 107, 107, 0.9);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .online .status {
            background: rgba(76, 175, 80, 0.9);
        }
        
        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            p { font-size: 1rem; }
            .logo { width: 100px; height: 100px; font-size: 40px; }
        }
    </style>
</head>
<body>
    <div class="status" id="status">🔴 Offline</div>
    
    <div class="container">
        <div class="logo">🐟</div>
        
        <h1>PradoAqui</h1>
        <p>Você está offline, mas algumas funcionalidades ainda estão disponíveis!</p>
        
        <div class="features">
            <h3>Disponível Offline:</h3>
            <ul>
                <li>Navegar pelas páginas visitadas</li>
                <li>Ver informações básicas dos pacotes</li>
                <li>Acessar conteúdo do blog salvo</li>
                <li>Visualizar galeria de fotos</li>
            </ul>
        </div>
        
        <button class="retry-btn" onclick="clearSWAndReload()">
            Tentar Reconectar
        </button>
    </div>

    <script>
        async function clearSWAndReload() {
            try {
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(regs.map(r => r.unregister()));
                }
                if ('caches' in window) {
                    const keys = await caches.keys();
                    await Promise.all(keys.map(k => caches.delete(k)));
                }
            } catch (e) {
                // ignore errors cleaning up
            } finally {
                // Redirect to the SPA entry so the fresh SW (if any) is fetched
                window.location.replace('/');
            }
        }

        // Monitor connection status
        function updateStatus() {
            const status = document.getElementById('status');
            const body = document.body;
            
            if (navigator.onLine) {
                status.textContent = '🟢 Online';
                body.classList.add('online');
                // When back online, clear old SW/caches and reload into the app
                clearSWAndReload();
            } else {
                status.textContent = '🔴 Offline';
                body.classList.remove('online');
            }
        }
        
        // Check status on load
        updateStatus();
        
        // Listen for connection changes
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        
        // Check connection every 5 seconds
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
